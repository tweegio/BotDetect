<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotFilter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
      padding: 16px 16px 12px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(245,158,11,0.4);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f5f5f5;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 10px;
      color: #666;
      margin-top: 1px;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161616;
      border-bottom: 1px solid #1f1f1f;
    }

    .toggle-label {
      font-size: 12px;
      font-weight: 500;
      color: #ccc;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #f59e0b;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* ── Stats ── */
    .stats {
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: #161616;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f59e0b;
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: #555;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .platform-badge {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px 10px;
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .platform-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .platform-dot.inactive { background: #555; }

    /* ── Sensibilidad ── */
    .section {
      padding: 0 16px 14px;
    }

    .section-title {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: #2a2a2a;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #f59e0b;
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      font-weight: 700;
      color: #f59e0b;
      min-width: 18px;
      text-align: right;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .slider-labels span {
      font-size: 9px;
      color: #444;
    }

    /* ── Footer / Pro ── */
    .footer {
      background: linear-gradient(135deg, #1a1200, #1a0f00);
      border-top: 1px solid #2a1f00;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pro-text {
      font-size: 10px;
      color: #856530;
    }

    .pro-text span { color: #f59e0b; font-weight: 600; }

    .donate-btn {
      font-size: 10px;
      font-weight: 600;
      color: #0f0f0f;
      background: #f59e0b;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .donate-btn:hover { background: #fbbf24; }

    /* ── Estado desactivado ── */
    body.disabled .stat-value { color: #444; }
    body.disabled .platform-dot { background: #555 !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>BotFilter</h1>
      <p>Filtro de bots para redes sociales</p>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Filtrado activo</span>
    <label class="toggle">
      <input type="checkbox" id="toggleEnabled" checked />
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="hiddenCount">0</div>
      <div class="stat-label">Ocultados</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="thresholdDisplay">3</div>
      <div class="stat-label">Umbral</div>
    </div>
    <div class="platform-badge">
      <div class="platform-dot" id="platformDot"></div>
      <span id="platformLabel">Cargando...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sensibilidad de detección</div>
    <div class="slider-row">
      <input type="range" id="thresholdSlider" min="1" max="6" step="0.5" value="3" />
      <span class="slider-value" id="sliderVal">3</span>
    </div>
    <div class="slider-labels">
      <span>Más estricto</span>
      <span>Más permisivo</span>
    </div>
  </div>

  <div class="footer">
    <div class="pro-text">¿Te ayuda? <span>Apoya el proyecto</span></div>
    <a class="donate-btn" href="https://buymeacoffee.com/" target="_blank" rel="noopener">☕ Donar</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
